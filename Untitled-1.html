<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionKu</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        header {
            background: #222;
            color: white;
            padding: 15px;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        .hero {
            background: url('https://via.placeholder.com/1200x400?text=Fashion+Store') no-repeat center;
            background-size: cover;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        .hero button {
            padding: 10px 20px;
            margin-top: 10px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        .produk {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        /* ✅ gambar sudah dirapikan */
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card button {
            padding: 8px 15px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1 id="logo">FashionKu</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#produk">Produk</a>
        <a href="#kategori">Kategori</a>
        <a href="#keranjang">Keranjang</a>
    </nav>
</header>

<main>

    <!-- Hero -->
    <section class="hero" id="home">
        <h2>Selamat Datang di Toko Fashion</h2>
        <p>Temukan gaya terbaikmu hari ini</p>
        <button>Belanja Sekarang</button>
    </section>

    <!-- Produk -->
    <section id="produk">
        <h2 style="text-align:center;">Produk Unggulan</h2>

        <div class="produk">

            <div class="card">
                <img src="https://i.pinimg.com/1200x/3d/98/ab/3d98aba8c4675afb5caa410676f69513.jpg" alt="Kaos Pria Casual">
                <h3>Kaos Pria Casual</h3>
                <p>Rp 120.000</p>
                <button>Tambah ke Keranjang</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200?text=Celana" alt="Celana Jeans">
                <h3>Celana Jeans</h3>
                <p>Rp 250.000</p>
                <button>Tambah ke Keranjang</button>
            </div>

            <div class="card">
                <img src="https://i.pinimg.com/webp/1200x/7f/b4/82/7fb482c80262aac8f638151e48cc773e.webp" alt="Sneakers Putih">
                <h3>Sneakers Putih</h3>
                <p>Rp 400.000</p>
                <button>Tambah ke Keranjang</button>
            </div>

            <div class="card">
                <img src="https://i.pinimg.com/236x/80/b7/1f/80b71f4486285bb4670ee42277ffcb2f.jpg" alt="Jaket Hoodie Pink">
                <h3>Jaket Hoodie Pink</h3>
                <p>Rp 300.000</p>
                <button>Tambah ke Keranjang</button>
            </div>

        </div>
    </section>

</main>

<footer>
    <p>Kontak: fashionku@email.com | 08123456789</p>
    <p>&copy; 2026 FashionKu</p>
</footer>

</body>
</html>
